{% extends "base/layout.html" %}
{% block title %}정책 등록{% endblock %}
{% block content %}
<h2>정책 등록</h2>
<form method="post">
    {% csrf_token %}
    <label>정책명</label>
    <input type="text" name="name" required />

    <label>정책 설명</label>
    <textarea name="description" rows="4"></textarea>

    <label>규칙 (한 줄당 1개)</label>
    <textarea name="rules" rows="4"></textarea>

    <label>검증 규칙 (한 줄당 1개)</label>
    <textarea name="validation_rules" rows="4"></textarea>

    <button type="submit">등록</button>
</form>
{% endblock %}
