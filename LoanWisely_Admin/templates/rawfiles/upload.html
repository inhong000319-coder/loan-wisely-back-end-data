{% extends "base/layout.html" %}
{% block title %}원천 파일 업로드{% endblock %}
{% block content %}
<h2>원천 파일 업로드</h2>
{% if result %}<pre>{{ result }}</pre>{% endif %}
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="file" />
    <button type="submit">업로드</button>
</form>
{% endblock %}
