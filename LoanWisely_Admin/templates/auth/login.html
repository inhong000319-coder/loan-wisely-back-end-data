{% extends "base/layout.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="auth-card">
    <h2 class="auth-title">LoanWisely Admin</h2>
    <p class="auth-subtitle">관리자 계정으로 로그인해 주세요.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}" />
        <label for="username">아이디</label>
        <input id="username" type="text" name="username" placeholder="아이디 입력" autocomplete="username" />
        <label for="password">비밀번호</label>
        <input id="password" type="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" />
        <button class="btn primary" type="submit">로그인</button>
    </form>
</div>
{% endblock %}
